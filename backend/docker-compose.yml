services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      CV_PDF_DIR: /app/data/cvs
      CHROMA_DIR: /app/data/chroma
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-cv_chunks}
      CHUNK_SIZE: ${CHUNK_SIZE:-1100}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-180}
    volumes:
      - ./data:/app/data

  tests:
    build:
      context: .
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      CV_PDF_DIR: /app/data/cvs
      CHROMA_DIR: /app/data/chroma
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-cv_chunks}
      CHUNK_SIZE: ${CHUNK_SIZE:-1100}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-180}
    volumes:
      - .:/app
      - ./data:/app/data
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-v"]
